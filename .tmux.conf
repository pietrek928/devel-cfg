# =============================================
# 1. MOUSE & GUI-LIKE BEHAVIOR
# =============================================

# Enable full mouse support (Click to select, drag to resize, scroll wheel)
set -g mouse on

# Fix scrolling in Claude Code / Editors
# (Passes scroll events to the app if it captures the mouse, otherwise scrolls tmux history)
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Position status bar at top (like browser tabs)
set-option -g status-position top

# Start window/pane numbering at 1 (0 is too far away on the keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on   # Re-number windows when one is closed

# Increase scrollback history (Essential for long Claude conversations)
set -g history-limit 50000

# =============================================
# 2. INTUITIVE SHORTCUTS (NO WEIRD PREFIXES)
# =============================================

# Change Prefix from Ctrl+b to Ctrl+Space
# (Much easier to hit with thumb + pinky)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Split panes with visual symbols
# (| for vertical split, - for horizontal split)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt + Arrow Keys (No Prefix needed!)
# Just hold Alt and press Left/Right/Up/Down
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows using Shift + Arrow Keys (Like switching browser tabs)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Zoom pane (maximize/minimize) with 'z' (standard, but good to know)
# Prefix + z

# Reload config instantly
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# =============================================
# 3. MODERN TERMINAL & CLIPBOARD (Merged)
# =============================================

# 1. Enable 256 colors
set -g default-terminal "tmux-256color"

# 2. MERGED OVERRIDES:
# - First part: Enable RGB (True Color)
# - Second part: Enable OSC 52 Clipboard (for VS Code Server / Remote)
# - The -a flag appends, allowing both to work.
set -ag terminal-overrides ",xterm-256color:RGB"
# set -ag terminal-overrides ",*:Ms=escapeE]52;%p1%s;%p2%status007"

# 3. Enable System Clipboard
# set -g @override_copy_command 'osc52'
set -g set-clipboard on

# Reduce escape time delay (Prevents weird lag in editors/Claude)
set -s escape-time 0

# =============================================
# 4. VISUAL THEME (Clean & minimal)
# =============================================

# Minimal status bar style
set -g status-style bg=default,fg=white
set -g window-status-current-style bg=blue,fg=black,bold
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g status-left-length 20
set -g status-right "%H:%M "

# =============================================
# 5. PLUGINS (Auto-install these)
# =============================================
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-yank'

# Mouse-based copy-paste behavior
# (Selecting text with mouse automatically copies it)
set -g @yank_selection_mouse 'clipboard'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g default-command "${SHELL}"
